<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Registro Exitoso! | Hatzolas Yisroel</title>
    <style>
        :root {
            --primary: #1a365d;
            --success: #38a169;
            --background: #f7fafc;
            --surface: #ffffff;
            --text-main: #2d3748;
            --text-light: #718096;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--surface);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
        }

        .icon {
            color: var(--success);
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            color: var(--primary);
            margin: 0 0 1rem 0;
            font-size: 1.8rem;
        }

        p {
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            display: inline-block;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #2b6cb0;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="icon">✓</div>
        <h1>¡Registro Exitoso!</h1>
        <p>Gracias por unirte a la comunidad Hatzolas Yisroel. Pronto recibirás un mensaje de WhatsApp de nuestro bot
            comunitario para confirmar tu acceso.</p>
        <a href="/" class="btn">Volver al Inicio</a>
    </div>

</body>

</html>
