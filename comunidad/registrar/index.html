<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Comunidad Hatzolas Yisroel</title>
    <style>
        :root {
            --primary: #1a365d;
            --secondary: #2b6cb0;
            --accent: #ed8936;
            --background: #f7fafc;
            --surface: #ffffff;
            --text-main: #2d3748;
            --text-light: #718096;
            --error: #e53e3e;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--surface);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            margin: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: var(--primary);
            font-size: 1.8rem;
            margin: 0 0 0.5rem 0;
        }

        .header p {
            color: var(--text-light);
            margin: 0;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        input,
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.1);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background-color: var(--secondary);
        }

        .error-message {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 0.25rem;
            display: none;
        }

        /* Loading animation */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>Únete a la Comunidad</h1>
            <p>Hatzolas Yisroel • Registro Oficial</p>
        </div>

        <!-- The form points to the N8N webhook we will deploy when access is restored -->
        <form id="onboardingForm">
            <div class="form-group">
                <label for="first_name">Nombre *</label>
                <input type="text" id="first_name" name="first_name" required>
            </div>

            <div class="form-group">
                <label for="last_name">Apellido *</label>
                <input type="text" id="last_name" name="last_name" required>
            </div>

            <div class="form-group">
                <label for="whatsapp">WhatsApp / Teléfono *</label>
                <input type="tel" id="whatsapp" name="whatsapp_number" placeholder="+57 300 000 0000" required>
            </div>

            <div class="form-group">
                <label for="role">Rol en la Comunidad *</label>
                <select id="role" name="role" required>
                    <option value="" disabled selected>Selecciona tu rol...</option>
                    <option value="Soy miembro">Soy miembro</option>
                    <option value="Soy visitante">Soy visitante</option>
                    <option value="Mi familia quiere unirse">Mi familia quiere unirse</option>
                </select>
            </div>

            <div class="form-group">
                <label for="family_size">Tamaño de Familia</label>
                <input type="number" id="family_size" name="family_size" min="1" placeholder="Ej. 4">
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">
                <span class="btn-text">Completar Registro</span>
                <div class="spinner"></div>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const text = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.spinner');

            // Show loading state
            text.style.display = 'none';
            spinner.style.display = 'block';
            btn.disabled = true;

            const formData = {
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                whatsapp_number: document.getElementById('whatsapp').value,
                role: document.getElementById('role').value,
                family_size: document.getElementById('family_size').value || 1
            };

            try {
                // This URL will be replaced with our live N8N webhook
                console.log("Sending data to Webhook:", formData);
                // Simulate network request
                await new Promise(r => setTimeout(r, 1500));
                window.location.href = 'success.html';
            } catch (error) {
                console.error('Error:', error);
                alert("Hubo un error al enviar el formulario. Por favor, intenta de nuevo.");

                // Reset button
                text.style.display = 'block';
                spinner.style.display = 'none';
                btn.disabled = false;
            }
        });
    </script>

</body>

</html>
